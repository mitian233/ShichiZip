targets:
  ShichiZipRevealInFileManagerAction:
    type: app-extension
    platform: macOS
    postBuildScripts: &generate_build_metadata
      - name: Generate Build Metadata
        basedOnDependencyAnalysis: false
        inputFiles:
          - $(TARGET_BUILD_DIR)/$(INFOPLIST_PATH)
        script: |
          sh "${SRCROOT}/project/scripts/generate-build-metadata.sh"
    sources:
      - &quick_action_swift_sources
        path: ../../ShichiZip/QuickActions
        excludes:
          - "Resources/**"
      - &shared_swift_log_source
        path: ../../ShichiZip/Utilities/SZLog.swift
      - path: ../generated/quick-actions/ShichiZipRevealInFileManagerAction
        buildPhase: resources
        optional: true
    dependencies: &quick_action_dependencies
      - sdk: AppIntents.framework
    settings:
      base:
        <<: &quick_action_mainline_settings
          CODE_SIGN_ENTITLEMENTS: ShichiZip/QuickActions/Resources/QuickAction.entitlements
          MACOSX_DEPLOYMENT_TARGET: "13.0"
          GENERATE_INFOPLIST_FILE: false
          APPLICATION_EXTENSION_API_ONLY: true
          SHICHIZIP_HOST_APP_DISPLAY_NAME: ShichiZip
          SHICHIZIP_QUICK_ACTION_APP_GROUP_IDENTIFIER: $(DEVELOPMENT_TEAM).ShichiZip
          SHICHIZIP_QUICK_ACTION_URL_SCHEME: shichizip
        PRODUCT_BUNDLE_IDENTIFIER: ee.dawn.ShichiZip.RevealInFileManagerAction
        PRODUCT_NAME: ShichiZipRevealInFileManagerAction
        SHICHIZIP_QUICK_ACTION_DISPLAY_NAME: "SZ: Reveal in File Manager"
        SHICHIZIP_QUICK_ACTION_LABEL: "SZ: Reveal in File Manager"
    info:
      path: ../generated/plists/ShichiZipRevealInFileManagerAction-Info.plist
      properties: &reveal_quick_action_info
        <<: &quick_action_info_common
          CFBundleDisplayName: $(SHICHIZIP_QUICK_ACTION_DISPLAY_NAME)
          CFBundleName: $(SHICHIZIP_QUICK_ACTION_DISPLAY_NAME)
          CFBundleShortVersionString: $(MARKETING_VERSION)
          CFBundleVersion: $(CURRENT_PROJECT_VERSION)
          LSMinimumSystemVersion: "13.0"
          ShichiZipHostAppDisplayName: $(SHICHIZIP_HOST_APP_DISPLAY_NAME)
          ShichiZipQuickActionAppGroupIdentifier: $(SHICHIZIP_QUICK_ACTION_APP_GROUP_IDENTIFIER)
          ShichiZipQuickActionURLScheme: $(SHICHIZIP_QUICK_ACTION_URL_SCHEME)
        NSExtension:
          <<: &quick_action_extension_common
            NSExtensionPointIdentifier: com.apple.services
          NSExtensionAttributes:
            <<: &quick_action_extension_attributes_common
              NSExtensionServiceAllowsFinderPreviewItem: true
              NSExtensionServiceFinderPreviewIconName: NSActionTemplate
              NSExtensionServiceFinderPreviewLabel: $(SHICHIZIP_QUICK_ACTION_LABEL)
              NSExtensionServiceRoleType: NSExtensionServiceRoleTypeViewer
            NSExtensionActivationRule: >-
              SUBQUERY(extensionItems, $extensionItem, $extensionItem.attachments.@count >= 1 &&
              $extensionItem.attachments.@count <= 64 &&
              SUBQUERY($extensionItem.attachments, $attachment,
              ANY $attachment.registeredTypeIdentifiers UTI-CONFORMS-TO "public.item").@count ==
              $extensionItem.attachments.@count).@count == 1
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShowInFileManagerQuickActionHandler

  ShichiZipOpenInShichiZipAction:
    type: app-extension
    platform: macOS
    postBuildScripts: *generate_build_metadata
    sources:
      - *quick_action_swift_sources
      - *shared_swift_log_source
      - path: ../generated/quick-actions/ShichiZipOpenInShichiZipAction
        buildPhase: resources
        optional: true
    dependencies: *quick_action_dependencies
    settings:
      base:
        <<: *quick_action_mainline_settings
        PRODUCT_BUNDLE_IDENTIFIER: ee.dawn.ShichiZip.OpenInShichiZipAction
        PRODUCT_NAME: ShichiZipOpenInShichiZipAction
        SHICHIZIP_QUICK_ACTION_DISPLAY_NAME: "SZ: Open in ShichiZip"
        SHICHIZIP_QUICK_ACTION_LABEL: "SZ: Open in ShichiZip"
    info:
      path: ../generated/plists/ShichiZipOpenInShichiZipAction-Info.plist
      properties: &open_quick_action_info
        <<: *quick_action_info_common
        NSExtension:
          <<: *quick_action_extension_common
          NSExtensionAttributes:
            <<: *quick_action_extension_attributes_common
            NSExtensionActivationRule: >-
              SUBQUERY(extensionItems, $extensionItem, $extensionItem.attachments.@count == 1 &&
              SUBQUERY($extensionItem.attachments, $attachment,
              ANY $attachment.registeredTypeIdentifiers UTI-CONFORMS-TO "public.item").@count == 1).@count == 1
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).OpenInShichiZipQuickActionHandler

  ShichiZipSmartQuickExtractAction:
    type: app-extension
    platform: macOS
    postBuildScripts: *generate_build_metadata
