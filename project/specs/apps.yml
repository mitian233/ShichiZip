targets:
  ShichiZip:
    type: application
    platform: macOS
    postBuildScripts: &generate_build_metadata
      - name: Generate Build Metadata
        basedOnDependencyAnalysis: false
        inputFiles:
          - $(TARGET_BUILD_DIR)/$(INFOPLIST_PATH)
        script: |
          sh "${SRCROOT}/project/scripts/generate-build-metadata.sh"
    sources: &app_sources
      - path: ../../ShichiZip
        excludes: &app_source_excludes
          - "**/*.entitlements"
          - "Resources/Localization/**"
          - "QuickActions/Extensions/**"
          - "QuickLookPreview/Extension/**"
    dependencies:
      - sdk: AppIntents.framework
      - target: ShichiZipLocalization
        embed: true
      - target: ShichiZipArchiveCore
        embed: true
      - target: ShichiZipRevealInFileManagerAction
        embed: true
      - target: ShichiZipOpenInShichiZipAction
        embed: true
      - target: ShichiZipSmartQuickExtractAction
        embed: true
      - target: ShichiZipArchivePreviewExtension
        embed: true
    settings:
      base:
        <<: &common_app_settings
          INFOPLIST_FILE: ShichiZip/Resources/Info.plist
          CODE_SIGN_ENTITLEMENTS: ShichiZip/Resources/ShichiZip.entitlements
          CLANG_CXX_LANGUAGE_STANDARD: c++23
          SWIFT_OBJC_BRIDGING_HEADER: ShichiZip/App/ShichiZip-Bridging-Header.h
          HEADER_SEARCH_PATHS:
            - $(PROJECT_DIR)/$(SEVENZ_VENDOR_ROOT)
            - $(PROJECT_DIR)/$(SEVENZ_VENDOR_ROOT)/CPP
            - $(PROJECT_DIR)/$(SEVENZ_VENDOR_ROOT)/C
          OTHER_LDFLAGS:
            - $(inherited)
            - -liconv
            - -lpthread
          MACOSX_DEPLOYMENT_TARGET: "13.0"
          GENERATE_INFOPLIST_FILE: false
          CLANG_ENABLE_OBJC_ARC: true
          CLANG_WARN_DOCUMENTATION_COMMENTS: false
        PRODUCT_BUNDLE_IDENTIFIER: ee.dawn.ShichiZip
        PRODUCT_NAME: ShichiZip
        SHICHIZIP_APP_DISPLAY_NAME: ShichiZip
        SHICHIZIP_ARCHIVE_CORE_NAME: 7-Zip
        SHICHIZIP_COPYRIGHT_LINE: "GitHub: idawnlight/ShichiZip, 7-Zip based."
        SHICHIZIP_LICENSE_SOURCE_PATH: vendor/7zip/DOC/License.txt
        SHICHIZIP_SFX_SOURCE_PATH: build/sfx/7z-mainline-x86.sfx
        SHICHIZIP_QUICK_ACTION_APP_GROUP_IDENTIFIER: $(DEVELOPMENT_TEAM).ShichiZip
        SHICHIZIP_QUICK_ACTION_URL_SCHEME: shichizip
        SEVENZ_LIBRARY_NAME: lib7zip.a
        SEVENZ_VENDOR_ROOT: vendor/7zip
        GCC_PREPROCESSOR_DEFINITIONS:
          - "$(inherited)"
          - "NDEBUG=1"
          - "SHICHIZIP_ZS_VARIANT=0"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS:
          - "$(inherited)"

  ShichiZipTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ../../ShichiZipTests
    dependencies:
      - target: ShichiZip
      - target: ShichiZipArchiveCore
      - sdk: AppIntents.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ee.dawn.ShichiZipTests
        PRODUCT_NAME: ShichiZipTests
        GENERATE_INFOPLIST_FILE: true
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_OBJC_BRIDGING_HEADER: ShichiZipTests/ShichiZipTests-Bridging-Header.h
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/ShichiZip.app/Contents/MacOS/ShichiZip
        BUNDLE_LOADER: $(TEST_HOST)
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@loader_path/../../../../Frameworks"

  ShichiZipUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: ../../ShichiZipUITests
    dependencies:
      - target: ShichiZip
      - sdk: AppIntents.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ee.dawn.ShichiZipUITests
        PRODUCT_NAME: ShichiZipUITests
        GENERATE_INFOPLIST_FILE: true
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        TEST_TARGET_NAME: ShichiZip

  ShichiZipZSTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ../../ShichiZipTests
    dependencies:
      - target: ShichiZipZS
      - target: ShichiZipZSArchiveCore
      - sdk: AppIntents.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ee.dawn.ShichiZipZSTests
        PRODUCT_NAME: ShichiZipZSTests
        GENERATE_INFOPLIST_FILE: true
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_OBJC_BRIDGING_HEADER: ShichiZipTests/ShichiZipTests-Bridging-Header.h
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/ShichiZip ZS.app/Contents/MacOS/ShichiZip ZS
        BUNDLE_LOADER: $(TEST_HOST)
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@loader_path/../../../../Frameworks"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS:
          - "$(inherited)"
          - "SHICHIZIP_ZS_VARIANT"

  ShichiZipZSUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: ../../ShichiZipUITests
    dependencies:
      - target: ShichiZipZS
      - sdk: AppIntents.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ee.dawn.ShichiZipZSUITests
        PRODUCT_NAME: ShichiZipZSUITests
        GENERATE_INFOPLIST_FILE: true
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        TEST_TARGET_NAME: ShichiZipZS
        SWIFT_ACTIVE_COMPILATION_CONDITIONS:
          - "$(inherited)"
          - "SHICHIZIP_ZS_VARIANT"

  ShichiZipZS:
    type: application
    platform: macOS
    postBuildScripts: *generate_build_metadata
    sources: *app_sources
    dependencies:
      - sdk: AppIntents.framework
      - target: ShichiZipLocalization
        embed: true
      - target: ShichiZipZSArchiveCore
        embed: true
      - target: ShichiZipZSRevealInFileManagerAction
        embed: true
      - target: ShichiZipZSOpenInShichiZipAction
        embed: true
      - target: ShichiZipZSSmartQuickExtractAction
        embed: true
      - target: ShichiZipZSArchivePreviewExtension
        embed: true
    settings:
      base:
        <<: *common_app_settings
        PRODUCT_BUNDLE_IDENTIFIER: ee.dawn.ShichiZipZS
        PRODUCT_NAME: ShichiZip ZS
        SHICHIZIP_APP_DISPLAY_NAME: ShichiZip ZS
        SHICHIZIP_ARCHIVE_CORE_NAME: 7-Zip-zstd
        SHICHIZIP_COPYRIGHT_LINE: "GitHub: idawnlight/ShichiZip, 7-Zip ZS (mcmilk/7-Zip-zstd) based."
        SHICHIZIP_LICENSE_SOURCE_PATH: vendor/7zip-zstd/COPYING
        SHICHIZIP_SFX_SOURCE_PATH: build/sfx/7z-zs-x86.sfx
        SHICHIZIP_QUICK_ACTION_APP_GROUP_IDENTIFIER: $(DEVELOPMENT_TEAM).ShichiZipZS
        SHICHIZIP_QUICK_ACTION_URL_SCHEME: shichizipzs
        SEVENZ_LIBRARY_NAME: lib7zip-zs.a
        SEVENZ_VENDOR_ROOT: vendor/7zip-zstd
        GCC_PREPROCESSOR_DEFINITIONS:
          - "$(inherited)"
          - "NDEBUG=1"
          - "SHICHIZIP_ZS_VARIANT=1"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS:
          - "$(inherited)"
          - "SHICHIZIP_ZS_VARIANT"