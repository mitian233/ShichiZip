name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source-tarball:
    name: Source Tarball
    runs-on: macos-26
    steps:
      - name: Check out repository with submodules
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Apply vendor patches
        run: |
          sh vendor/apply_7zip_patches.sh vendor/7zip
          sh vendor/apply_7zip_patches.sh vendor/7zip-zstd

      - name: Install build tools
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Snapshot build metadata
        run: |
          commit_count="$(git rev-list --count HEAD)"
          short_hash="$(git rev-parse --short HEAD)"
          printf 'BUILD_COMMIT_COUNT="%s"\nBUILD_SHORT_HASH="%s"\n' \
            "$commit_count" "$short_hash" > .build-metadata

      - name: Strip .git directories and files
        run: find . -name '.git*' -exec rm -rf {} +

      - name: Create source tarball
        run: |
          repo_name="shichizip"
          short_sha="${GITHUB_SHA::7}"
          gtar -czf "$RUNNER_TEMP/${repo_name}-${short_sha}-source.tar.gz" \
            --transform "s,^\.,${repo_name}-${short_sha}," \
            .

      - name: Upload source tarball
        uses: actions/upload-artifact@v7
        with:
          path: ${{ runner.temp }}/shichizip-*-source.tar.gz
          if-no-files-found: error
          archive: false

  macos-build:
    name: Build and Test (${{ matrix.artifact_prefix }}, ${{ matrix.target_arch }})
    needs: source-tarball
    runs-on: macos-26
    environment: development
    strategy:
      fail-fast: false
      matrix:
        include:
          - scheme: ShichiZip
            zig_variant: mainline
            zig_target: aarch64-native
            app_bundle: ShichiZip.app
            artifact_prefix: ShichiZip
            target_arch: arm64
          - scheme: ShichiZip
            zig_variant: mainline
            zig_target: x86_64-native
            app_bundle: ShichiZip.app
            artifact_prefix: ShichiZip
            target_arch: x86_64
          - scheme: ShichiZipZS
            zig_variant: zs
            zig_target: aarch64-native
            app_bundle: ShichiZip ZS.app
            artifact_prefix: ShichiZipZS
            target_arch: arm64
          - scheme: ShichiZipZS
            zig_variant: zs
            zig_target: x86_64-native
            app_bundle: ShichiZip ZS.app
            artifact_prefix: ShichiZipZS
            target_arch: x86_64
    env:
      MACOSX_DEPLOYMENT_TARGET: "13.0"
      XCODE_PROJECT: ShichiZip.xcodeproj
      XCODE_CONFIGURATION: Debug

    steps:
      - name: Download source tarball
        uses: actions/download-artifact@v8
        with:
          pattern: shichizip-*-source.tar.gz
          path: ${{ runner.temp }}/source
          skip-decompress: true

      - name: Extract source tarball
        run: |
          tarball="$(ls "$RUNNER_TEMP"/source/shichizip-*-source.tar.gz)"
          tar -xzf "$tarball" --strip-components=1

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
        with:
          version: 0.16.0
          cache-key: ${{ matrix.zig_variant }}-${{ matrix.zig_target }}

      - name: Select Xcode 26.4
        run: sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer

      - name: Build archive core artifacts
        run: |
          zig build lib \
            -Dvariant="${{ matrix.zig_variant }}" \
            -Dtarget="${{ matrix.zig_target }}" \
            -Doptimize=ReleaseFast \
            -p build \
            --summary all \
            --verbose

          zig build sfx \
            -Dvariant="${{ matrix.zig_variant }}" \
            -Doptimize=ReleaseSmall \
            -p build \
            --summary all \
            --verbose

      - name: Configure signing mode
        id: signing
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_P12_PASSWORD }}
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          if [[ -n "$CERTIFICATE_P12_BASE64" && -n "$CERTIFICATE_PASSWORD" && -n "$SIGNING_IDENTITY" ]]; then
            echo "has_certificate=true" >> "$GITHUB_OUTPUT"
            echo "code_sign_identity=$SIGNING_IDENTITY" >> "$GITHUB_OUTPUT"
            echo "Using imported signing certificate."
          else
            echo "has_certificate=false" >> "$GITHUB_OUTPUT"
            echo "code_sign_identity=-" >> "$GITHUB_OUTPUT"
            echo "Signing secrets are unavailable; using ad-hoc signing for validation."
          fi

      - name: Install signing certificate
        if: steps.signing.outputs.has_certificate == 'true'
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          rm -f "$CERT_PATH"

      - name: Build and sign app bundle
        run: |
          derived_data_path="build/DerivedData/${{ matrix.scheme }}"

          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "${{ matrix.scheme }}" \
            -configuration "$XCODE_CONFIGURATION" \
            -derivedDataPath "$derived_data_path" \
            -arch "${{ matrix.target_arch }}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="${{ steps.signing.outputs.code_sign_identity }}" \
            build

      - name: Verify app bundle signature
        run: |
          derived_data_path="build/DerivedData/${{ matrix.scheme }}"
          app_path="${derived_data_path}/Build/Products/${XCODE_CONFIGURATION}/${{ matrix.app_bundle }}"

          test -d "$app_path"

          codesign --verify --deep --strict --verbose=2 "$app_path"

      - name: Package app artifact
        id: package_artifact
        run: |
          derived_data_path="build/DerivedData/${{ matrix.scheme }}"
          app_path="${derived_data_path}/Build/Products/${XCODE_CONFIGURATION}/${{ matrix.app_bundle }}"
          artifact_dir="build/artifacts/${{ matrix.scheme }}"
          commit_hash="${{ github.sha }}"
          short_commit_hash="${commit_hash:0:7}"
          artifact_name="${{ matrix.artifact_prefix }}-${short_commit_hash}-${{ matrix.target_arch }}"
          artifact_path="${artifact_dir}/${artifact_name}.zip"

          test -d "$app_path"
          mkdir -p "$artifact_dir"
          rm -f "$artifact_path"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "$artifact_path"
          echo "path=$artifact_path" >> "$GITHUB_OUTPUT"

      - name: Upload app artifact
        uses: actions/upload-artifact@v7
        with:
          path: ${{ steps.package_artifact.outputs.path }}
          if-no-files-found: error
          archive: false

      - name: Run unit tests
        run: |
          derived_data_path="build/DerivedData/${{ matrix.scheme }}"

          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "${{ matrix.scheme }}" \
            -configuration "$XCODE_CONFIGURATION" \
            -derivedDataPath "$derived_data_path" \
            -arch "${{ matrix.target_arch }}" \
            "-only-testing:${{ matrix.scheme }}Tests" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="${{ steps.signing.outputs.code_sign_identity }}" \
            test

      - name: Run UI tests
        run: |
          derived_data_path="build/DerivedData/${{ matrix.scheme }}"

          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "${{ matrix.scheme }}" \
            -configuration "$XCODE_CONFIGURATION" \
            -derivedDataPath "$derived_data_path" \
            -arch "${{ matrix.target_arch }}" \
            "-only-testing:${{ matrix.scheme }}UITests" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="${{ steps.signing.outputs.code_sign_identity }}" \
            test

      - name: Collect failed test diagnostics
        if: failure()
        run: |
          diagnostics_dir="build/test-diagnostics/${{ matrix.scheme }}-${{ matrix.target_arch }}"
          test_logs_dir="build/DerivedData/${{ matrix.scheme }}/Logs/Test"
          diagnostic_reports_dir="$diagnostics_dir/DiagnosticReports"

          mkdir -p "$diagnostics_dir" "$diagnostic_reports_dir"

          if [[ -d "$test_logs_dir" ]]; then
            ditto "$test_logs_dir" "$diagnostics_dir/TestLogs"
          fi

          for source_dir in "$HOME/Library/Logs/DiagnosticReports" "/Library/Logs/DiagnosticReports"; do
            [[ -d "$source_dir" ]] || continue
            find "$source_dir" -type f \( \
              -name "*.crash" -o \
              -name "*.hang" -o \
              -name "*.ips" -o \
              -name "*.spin" -o \
              -name "*spindump*" \
            \) -print0 | while IFS= read -r -d '' report; do
              cp -p "$report" "$diagnostic_reports_dir/$(basename "$report")"
            done
          done

      - name: Upload failed test diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-diagnostics-${{ matrix.artifact_prefix }}-${{ matrix.target_arch }}-${{ github.run_attempt }}
          path: build/test-diagnostics/${{ matrix.scheme }}-${{ matrix.target_arch }}
          if-no-files-found: warn
